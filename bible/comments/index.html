<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesis 1 Viewer (comments)</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button id="menuToggle" class="menu-toggle" aria-label="Open verse menu">☰</button>
  <aside id="verseMenu" class="verse-menu" aria-hidden="true">
    <div class="menu-header">
      <h2>Genesis 1 Verses</h2>
      <button id="menuClose" class="close-btn" aria-label="Close verse menu">×</button>
    </div>
    <ul id="verseList"></ul>
  </aside>
  <main id="content" class="content">
    <h1>Genesis 1 (NIV-style)</h1>
    <p class="intro">This page is in comments folder for reading only. Use top-left menu to jump to verses.</p>
    <section id="chapter" class="chapter"></section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
