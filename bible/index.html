<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible Viewer</title>
  <link rel="icon" type="image/png" href="img/junha.png" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #ffffff; color: #1a1a1a; }
    .topbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 25; background: #ffffff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.9rem 1.2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .topbar-left { position: relative; display: flex; align-items: center; min-width: 0; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; min-width: 0; flex-wrap: wrap; justify-content: flex-end; }
    .menu-btn { border: 1px solid #d0d0d0; background: #ffffff; color: #666666; padding: 0.7rem 1.2rem; border-radius: 0.6rem; cursor: pointer; font-size: 0.95rem; font-weight: 500; font-family: inherit; transition: all 0.2s ease; }
    .menu-btn:hover { background: #f8f8f8; border-color: #999999; color: #333333; }
    .menu-btn:focus { outline: 2px solid #0066cc; outline-offset: 2px; }
    .settings-btn { display: inline-flex; align-items: center; justify-content: center; width: 2.9rem; height: 2.9rem; border: 1px solid #d0d7e2; border-radius: 999px; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); color: #334155; cursor: pointer; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, color 0.18s ease; flex-shrink: 0; }
    .settings-btn:hover { color: #0f172a; border-color: #94a3b8; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12); }
    .settings-btn:focus-visible { outline: 2px solid #0066cc; outline-offset: 2px; }
    .settings-icon { font-size: 1.2rem; line-height: 1; }
    .settings-modal-card { width: min(92vw, 420px); background: #ffffff; border-radius: 1rem; box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24); }
    .settings-modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 1rem 1rem 0.5rem; }
    .settings-modal-title { margin: 0; font-size: 1.2rem; color: #111827; }
    .settings-modal-subtitle { margin: 0.25rem 0 0; color: #64748b; font-size: 0.9rem; }
    .settings-modal-body { padding: 0 1rem 1rem; }
    .settings-section-label { margin: 0 0 0.7rem; font-size: 0.74rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
    .translation-switch { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.28rem; border: 1px solid #dbe3ef; border-radius: 999px; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 1px 2px rgba(15, 23, 42, 0.06); width: 100%; justify-content: stretch; }
    .translation-btn { border: none; background: transparent; color: #64748b; padding: 0.48rem 0.9rem; border-radius: 999px; font: inherit; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; min-height: 2.35rem; min-width: 3.5rem; transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease; }
    .translation-btn:hover { color: #0f172a; background: rgba(148, 163, 184, 0.14); }
    .translation-btn:focus-visible { outline: 2px solid #0066cc; outline-offset: 2px; }
    .translation-btn.active { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: #ffffff; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16); }
    .translation-switch .translation-btn { flex: 1 1 0; }
    .menu-drop { display: grid; position: absolute; top: 3.8rem; left: 1.2rem; width: min(92vw, 640px); max-height: 500px; overflow-x: hidden; overflow-y: auto; background: #ffffff; border: 1px solid #e5e5e5; border-radius: 0.8rem; box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 26; gap: 0.8rem; padding: 1rem; opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-0.75rem) scaleY(0.92); transform-origin: top left; transition: opacity 0.2s ease, transform 0.22s ease, visibility 0.22s ease; }
    .menu-drop.open { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0) scaleY(1); }
    .menu-drop.slide-in-next { animation: menu-slide-next 0.22s ease; }
    .menu-drop.slide-in-back { animation: menu-slide-back 0.22s ease; }
    .menu-drop button { aspect-ratio: 1; border: 1px solid #d0d0d0; background: #f8f8f8; color: #1a1a1a; cursor: pointer; font-size: 1rem; font-family: inherit; transition: all 0.15s ease; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; font-weight: 600; }
    .menu-drop button:hover { background: #0066cc; color: #ffffff; border-color: #0066cc; }
    .menu-drop.new-testament-menu button:hover { background: #dc2626; color: #ffffff; border-color: #dc2626; }
    .menu-drop.books-view { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
    .menu-drop.number-grid-view { grid-template-columns: repeat(auto-fit, minmax(56px, 56px)); justify-content: start; }
    .menu-drop.number-grid-view button { width: 56px; height: 56px; font-size: 0.95rem; }
    .menu-drop .back-btn { background: #f8f8f8; color: #1a1a1a; margin-bottom: 0.5rem; }
    .menu-drop .current-chapter { background: #0066cc; color: #ffffff; border-color: #0066cc; }
    .menu-drop .book-btn { font-weight: bold; aspect-ratio: auto; min-height: 3rem; padding: 0.5rem; }
    .menu-drop .book-btn.old-testament { background: #e6f3ff; color: #0066cc; border-color: #0066cc; }
    .menu-drop .book-btn.new-testament { background: #fee2e2; color: #b91c1c; border-color: #dc2626; }
    .menu-drop .book-btn.old-testament:hover { background: #0066cc; color: #ffffff; border-color: #0066cc; }
    .menu-drop .book-btn.new-testament:hover { background: #dc2626; color: #ffffff; border-color: #dc2626; }
    .menu-subhead { grid-column: 1 / -1; margin: 0; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280; }
    .menu-status { grid-column: 1 / -1; padding: 0.6rem; color: #666666; text-align: center; font-size: 0.95rem; }
    .reading-status { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; min-width: 0; padding: 0.45rem 0.8rem; border: 1px solid #dbe3ef; border-radius: 0.85rem; background: rgba(248, 250, 252, 0.96); box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05); }
    .reading-status-label { margin: 0; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
    .reading-status-value { margin: 0.15rem 0 0; font-size: 0.94rem; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 38vw; }
    .content { max-width: 900px; margin: 5.5rem auto 3rem; padding: 2rem 1.5rem; }
    .chapter-title { font-size: 2.5rem; font-weight: 700; margin: 0 0 1rem; color: #000000; text-align: center; }
    .hint { color: #666666; margin-bottom: 2rem; font-size: 0.95rem; text-align: center; }
    .verse-card { background: transparent; border: none; border-left: 3px solid var(--verse-accent, #0066cc); border-radius: 0; padding: 1rem 0 1rem 2.4rem; margin-bottom: 1.4rem; position: relative; }
    .verse-card.verse-flash { animation: verse-flash 1s ease; }
    .verse-line { margin: 0; line-height: 1.75; font-size: 1.05rem; color: #1a1a1a; }
    .location-link { border: none; background: none; padding: 0; color: inherit; font: inherit; font-weight: 700; text-decoration: underline; text-decoration-color: var(--verse-accent, #0066cc); text-decoration-thickness: 2px; text-underline-offset: 0.16em; cursor: pointer; transition: color 0.18s ease, text-decoration-color 0.18s ease; }
    .location-link:hover { color: var(--verse-accent, #0066cc); }
    .location-link:focus { outline: 2px solid var(--verse-accent, #0066cc); outline-offset: 2px; border-radius: 0.2rem; }
    .word-link { border: none; background: none; padding: 0; color: inherit; font: inherit; cursor: pointer; }
    .word-link:hover { color: #0f172a; background: rgba(148, 163, 184, 0.16); border-radius: 0.2rem; }
    .word-link:focus { outline: 2px solid #94a3b8; outline-offset: 2px; border-radius: 0.2rem; }
    .verse-number { position: absolute; left: 0; top: 0; color: var(--verse-accent, #0066cc); font-weight: bold; padding-left: 0.5rem; width: 1.6rem; text-align: center; }
    .verse-number.single-digit { font-size: 1.08rem; }
    .verse-number.double-digit { font-size: 1rem; }
    .nav-btn { position: fixed; right: 1.5rem; top: 50%; transform: translateY(-50%); width: 3rem; height: 3rem; border: 1px solid #d0d0d0; background: #ffffff; color: #0066cc; font-size: 1.5rem; cursor: pointer; border-radius: 50%; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,.08); display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem; }
    .nav-btn:hover { background: #f8f8f8; border-color: #0066cc; box-shadow: 0 4px 12px rgba(0,102,204,.12); }
    .nav-btn:disabled { opacity: 0; visibility: hidden; }
    .prev-btn { right: auto; left: 1.5rem; }
    .nav-btn-label { display: none; font-size: 0.96rem; font-weight: 700; letter-spacing: 0.01em; }
    .nav-btn-icon { line-height: 1; }
    .location-modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; background: rgba(15, 23, 42, 0.62); z-index: 80; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.2s ease, visibility 0.2s ease; }
    .location-modal.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .location-modal-card { width: min(92vw, 620px); max-height: min(88vh, 820px); overflow: auto; background: #ffffff; border-radius: 1rem; box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24); }
    .location-modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 1rem 1rem 0.4rem; }
    .location-modal-title { margin: 0; font-size: 1.35rem; color: #111827; }
    .location-modal-subtitle { margin: 0.25rem 0 0; color: #64748b; font-size: 0.9rem; }
    .location-close { width: 2.5rem; height: 2.5rem; border: 1px solid #d0d0d0; border-radius: 999px; background: #ffffff; color: #475569; cursor: pointer; font-size: 1.3rem; line-height: 1; }
    .location-close:hover { background: #f8fafc; }
    .location-modal-body { padding: 0 1rem 1rem; }
    .location-map-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.75rem; }
    .location-map-toolbar p { margin: 0; color: #475569; font-size: 0.92rem; }
    .location-map-controls { display: flex; gap: 0.5rem; }
    .location-map-controls button { border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; border-radius: 0.7rem; padding: 0.45rem 0.7rem; cursor: pointer; font: inherit; font-weight: 600; }
    .location-map-controls button:hover { background: #f8fafc; }
    .location-map-frame { aspect-ratio: 1 / 1; width: 100%; border-radius: 0.9rem; overflow: hidden; background: #f8fafc; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }
    .location-map-frame img { width: 100%; height: 100%; object-fit: contain; display: block; transform: scale(var(--location-map-scale, 1)); transform-origin: center center; transition: transform 0.18s ease; }
    .location-map-gallery { margin: 0.85rem 0 0; padding: 0; list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 0.6rem; }
    .location-map-gallery button { width: 100%; border: 1px solid #cbd5e1; border-radius: 0.8rem; background: #ffffff; padding: 0.35rem; cursor: pointer; text-align: left; }
    .location-map-gallery button:hover { border-color: #94a3b8; background: #f8fafc; }
    .location-map-gallery button.active { border-color: var(--verse-accent, #0066cc); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12); }
    .location-map-gallery img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 0.55rem; display: block; }
    .location-map-gallery span { display: block; margin-top: 0.35rem; font-size: 0.78rem; line-height: 1.35; color: #334155; }
    .location-map-caption { margin: 0.75rem 0 0; color: #475569; font-size: 0.92rem; }
    .location-description { margin: 1rem 0 0; color: #1f2937; line-height: 1.6; }
    .location-references { margin: 1rem 0 0; padding: 0; list-style: none; display: grid; gap: 0.55rem; }
    .location-references li { padding: 0.7rem 0.8rem; border: 1px solid #e5e7eb; border-radius: 0.8rem; background: #f8fafc; }
    .location-reference-label { font-weight: 700; color: #0f172a; }
    .location-reference-text { margin: 0.24rem 0 0; color: #334155; font-size: 0.92rem; }
    .word-modal-card { width: min(92vw, 460px); max-height: min(78vh, 560px); overflow: auto; background: #ffffff; border-radius: 1rem; box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24); }
    .word-modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 1rem 1rem 0.4rem; }
    .word-modal-title { margin: 0; font-size: 1.4rem; color: #111827; }
    .word-modal-subtitle { margin: 0.25rem 0 0; color: #64748b; font-size: 0.9rem; }
    .word-modal-body { padding: 0 1rem 1rem; }
    .word-meaning-card { padding: 1rem; border-radius: 0.95rem; background: #f8fafc; border: 1px solid #dbe3ef; }
    .word-meaning-korean { margin: 0; font-size: 1.06rem; line-height: 1.8; color: #111827; }
    @keyframes menu-slide-next {
      from { opacity: 0; transform: translateX(1.4rem); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes menu-slide-back {
      from { opacity: 0; transform: translateX(-1.4rem); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes verse-flash {
      0% { background: var(--verse-flash-bg-start, rgba(0, 102, 204, 0)); border-left-color: var(--verse-accent, #0066cc); }
      35% { background: var(--verse-flash-bg-mid, rgba(0, 102, 204, 0.14)); border-left-color: var(--verse-accent-strong, #1d4ed8); }
      100% { background: var(--verse-flash-bg-start, rgba(0, 102, 204, 0)); border-left-color: var(--verse-accent, #0066cc); }
    }
    @media (max-width: 720px) {
      .topbar { align-items: flex-start; flex-wrap: wrap; gap: 0.75rem; }
      .topbar-left { width: 100%; }
      .topbar-right { width: 100%; margin-left: 0; justify-content: space-between; }
      .content { margin-top: 6.6rem; }
    }
    @media (max-width: 520px) {
      .topbar { padding: 0.8rem 0.85rem; }
      .menu-btn { padding: 0.7rem 1rem; min-height: 2.8rem; }
      .topbar-right { align-items: stretch; gap: 0.6rem; }
      .settings-btn { width: 2.8rem; height: 2.8rem; }
      .translation-switch { padding: 0.24rem; }
      .translation-btn { padding: 0.5rem 0.75rem; font-size: 0.82rem; min-height: 2.5rem; min-width: 3.25rem; }
      .reading-status { flex: 1 1 auto; align-items: flex-start; padding: 0.45rem 0.65rem; min-width: 0; }
      .reading-status-value { font-size: 0.82rem; max-width: 100%; }
      .menu-drop { left: 4vw; width: 92vw; gap: 0.65rem; }
      .menu-drop.books-view { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .menu-drop.number-grid-view { grid-template-columns: repeat(auto-fit, minmax(48px, 48px)); }
      .menu-drop.number-grid-view button { width: 48px; height: 48px; font-size: 0.9rem; }
      .settings-modal { align-items: flex-end; padding: 0; }
      .settings-modal-card { width: 100%; border-radius: 1.2rem 1.2rem 0 0; }
      .content { margin-top: 7.1rem; margin-bottom: 7rem; padding: 1.5rem 1rem calc(1.5rem + env(safe-area-inset-bottom)); }
      .nav-btn { top: auto; bottom: calc(0.9rem + env(safe-area-inset-bottom)); transform: none; width: calc(50vw - 1.35rem); height: 3.6rem; border-radius: 1rem; font-size: 1.1rem; z-index: 35; box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16); }
      .prev-btn { left: 0.85rem; right: auto; }
      .next-btn { right: 0.85rem; left: auto; }
      .nav-btn-label { display: inline; }
      .location-modal-header { padding: 0.9rem 0.9rem 0.3rem; }
      .location-modal-body { padding: 0 0.9rem 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button id="menuButton" class="menu-btn" aria-haspopup="true" aria-expanded="false">Bible ▼</button>
      <div id="menuDrop" class="menu-drop" aria-label="Bible navigation menu"></div>
    </div>
    <div class="topbar-right">
      <div class="reading-status" aria-live="polite">
        <p class="reading-status-label">Reading</p>
        <p id="readingStatusValue" class="reading-status-value">Loading...</p>
      </div>
      <button id="settingsButton" class="settings-btn" type="button" aria-label="Open settings" aria-haspopup="dialog" aria-expanded="false">
        <span class="settings-icon">⚙</span>
      </button>
    </div>
  </div>

  <button id="prevChapterBtn" class="nav-btn prev-btn" aria-label="Previous chapter">
    <span class="nav-btn-icon">←</span>
    <span class="nav-btn-label">Prev</span>
  </button>
  <button id="nextChapterBtn" class="nav-btn next-btn" aria-label="Next chapter">
    <span class="nav-btn-label">Next</span>
    <span class="nav-btn-icon">→</span>
  </button>

  <main class="content">
    <h1 class="chapter-title">Loading...</h1>
    <p class="hint">Loading Bible data...</p>
    <div id="verseContainer"></div>
  </main>

  <div id="locationModal" class="location-modal" aria-hidden="true">
    <div class="location-modal-card" role="dialog" aria-modal="true" aria-labelledby="locationModalTitle">
      <div class="location-modal-header">
        <div>
          <h2 id="locationModalTitle" class="location-modal-title">Location</h2>
          <p id="locationModalSubtitle" class="location-modal-subtitle"></p>
        </div>
        <button id="locationModalClose" class="location-close" type="button" aria-label="Close location popup">×</button>
      </div>
      <div class="location-modal-body">
        <div class="location-map-toolbar">
          <p>Related Bible maps</p>
          <div class="location-map-controls">
            <button id="locationZoomOut" type="button" aria-label="Zoom out map">-</button>
            <button id="locationZoomReset" type="button">Reset</button>
            <button id="locationZoomIn" type="button" aria-label="Zoom in map">+</button>
          </div>
        </div>
        <div class="location-map-frame">
          <img id="locationModalImage" alt="" />
        </div>
        <p id="locationMapCaption" class="location-map-caption"></p>
        <ul id="locationMapGallery" class="location-map-gallery"></ul>
        <p id="locationDescription" class="location-description"></p>
        <ul id="locationReferences" class="location-references"></ul>
      </div>
    </div>
  </div>

  <div id="wordModal" class="location-modal" aria-hidden="true">
    <div class="word-modal-card" role="dialog" aria-modal="true" aria-labelledby="wordModalTitle">
      <div class="word-modal-header">
        <div>
          <h2 id="wordModalTitle" class="word-modal-title">Word</h2>
          <p id="wordModalSubtitle" class="word-modal-subtitle">Korean meaning</p>
        </div>
        <button id="wordModalClose" class="location-close" type="button" aria-label="Close word popup">×</button>
      </div>
      <div class="word-modal-body">
        <div class="word-meaning-card">
          <p id="wordMeaningText" class="word-meaning-korean"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="location-modal settings-modal" aria-hidden="true">
    <div class="settings-modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
      <div class="settings-modal-header">
        <div>
          <h2 id="settingsModalTitle" class="settings-modal-title">Settings</h2>
          <p class="settings-modal-subtitle">Choose your Bible version.</p>
        </div>
        <button id="settingsModalClose" class="location-close" type="button" aria-label="Close settings">×</button>
      </div>
      <div class="settings-modal-body">
        <p class="settings-section-label">Bible Version</p>
        <div class="translation-switch" role="tablist" aria-label="Bible translation">
          <button id="translationNivBtn" class="translation-btn active" type="button" data-translation="niv" role="tab" aria-selected="true">NIV</button>
          <button id="translationKjvBtn" class="translation-btn" type="button" data-translation="kjv" role="tab" aria-selected="false">KJV</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LOCATION_DATA_PATH = 'data/locations.json';
    const LOCAL_LOCATION_BUNDLE = 'data/locations.js';
    const WORD_MEANING_DATA_PATH = 'data/word-meanings.json';
    const LOCAL_WORD_MEANING_BUNDLE = 'data/word-meanings.js';
    const TRANSLATIONS = {
      niv: {
        id: 'niv',
        label: 'NIV',
        dataDir: 'Bible-niv-main',
        localBundle: 'data/verses.js',
        bundleKey: 'niv'
      },
      kjv: {
        id: 'kjv',
        label: 'KJV',
        dataDir: 'Bible-kjv-main',
        localBundle: 'data/verses-kjv.js',
        bundleKey: 'kjv'
      }
    };
    const DEFAULT_TRANSLATION_ID = 'niv';

    const menuButton = document.getElementById('menuButton');
    const menuDrop = document.getElementById('menuDrop');
    const settingsButton = document.getElementById('settingsButton');
    const translationButtons = Array.from(document.querySelectorAll('.translation-btn'));
    const verseContainer = document.getElementById('verseContainer');
    const nextChapterBtn = document.getElementById('nextChapterBtn');
    const prevChapterBtn = document.getElementById('prevChapterBtn');
    const chapterTitleEl = document.querySelector('.chapter-title');
    const hintEl = document.querySelector('.hint');
    const readingStatusValueEl = document.getElementById('readingStatusValue');
    const locationModal = document.getElementById('locationModal');
    const locationModalTitleEl = document.getElementById('locationModalTitle');
    const locationModalSubtitleEl = document.getElementById('locationModalSubtitle');
    const locationModalImageEl = document.getElementById('locationModalImage');
    const locationMapCaptionEl = document.getElementById('locationMapCaption');
    const locationMapGalleryEl = document.getElementById('locationMapGallery');
    const locationDescriptionEl = document.getElementById('locationDescription');
    const locationReferencesEl = document.getElementById('locationReferences');

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Could not load ${src}`));
        document.head.appendChild(script);
      });
    }

    async function loadBundledBibleData(translationId = state.translationId) {
      const translation = getTranslationConfig(translationId);
      const bundles = window.BIBLE_DATA_BUNDLES || {};

      if (bundles[translation.bundleKey]) {
        return bundles[translation.bundleKey];
      }

      if (translation.bundleKey === 'niv' && window.BIBLE_DATA) {
        return window.BIBLE_DATA;
      }

      if (window.location.protocol !== 'file:') {
        return null;
      }

      await loadScript(translation.localBundle);
      const loadedBundles = window.BIBLE_DATA_BUNDLES || {};
      return loadedBundles[translation.bundleKey] || (translation.bundleKey === 'niv' ? window.BIBLE_DATA || null : null);
    }

    async function loadBundledLocationData() {
      if (window.BIBLE_LOCATIONS) {
        return window.BIBLE_LOCATIONS;
      }

      if (window.location.protocol !== 'file:') {
        return null;
      }

      await loadScript(LOCAL_LOCATION_BUNDLE);
      return window.BIBLE_LOCATIONS || null;
    }

    async function loadBundledWordMeaningData() {
      if (window.BIBLE_WORD_MEANINGS) {
        return window.BIBLE_WORD_MEANINGS;
      }

      if (window.location.protocol !== 'file:') {
        return null;
      }

      await loadScript(LOCAL_WORD_MEANING_BUNDLE);
      return window.BIBLE_WORD_MEANINGS || null;
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('Could not load ' + path + ' (HTTP ' + response.status + ')');
      }
      return await response.json();
    }

    function buildLocationMatcher(locations) {
      const names = locations
        .map((entry) => entry.name)
        .filter(Boolean)
        .sort((a, b) => b.length - a.length);

      if (!names.length) {
        return null;
      }

      return new RegExp(`(?<![A-Za-z])(${names.map(escapeRegExp).join('|')})(?![A-Za-z])`, 'g');
    }

    async function loadLocationData() {
      try {
        const bundledLocations = await loadBundledLocationData();
        const data = bundledLocations || await fetchJson(LOCATION_DATA_PATH);
        const entries = Array.isArray(data.locations) ? data.locations : [];
        state.locationEntries = entries;
        state.locationLookup = new Map(entries.map((entry) => [entry.name, entry]));
        state.locationPattern = buildLocationMatcher(entries);
      } catch (error) {
        console.warn('Could not load location data:', error);
        state.locationEntries = [];
        state.locationLookup = new Map();
        state.locationPattern = null;
      }
    }

    async function loadWordMeaningData() {
      try {
        const bundledWordMeanings = await loadBundledWordMeaningData();
        const data = bundledWordMeanings || await fetchJson(WORD_MEANING_DATA_PATH);
        const words = data && typeof data.words === 'object' ? data.words : {};
        state.wordMeaningLookup = new Map(
          Object.entries(words).map(([word, meaning]) => [word.toLowerCase(), meaning])
        );
      } catch (error) {
        console.warn('Could not load word meanings:', error);
        state.wordMeaningLookup = new Map();
      }
    }

    function normalizeBookPayload(raw) {
      if (raw && raw.book && Array.isArray(raw.chapters)) {
        const normalized = {};
        raw.chapters.forEach((chapterObj) => {
          const chapterKey = String(chapterObj.chapter);
          const verses = Array.isArray(chapterObj.verses) ? [...chapterObj.verses] : [];
          verses.sort((a, b) => Number(a.verse) - Number(b.verse));
          normalized[chapterKey] = verses.map((verseObj) => verseObj.text ?? '');
        });
        return normalized;
      }

      if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
        return raw;
      }

      throw new Error('Unexpected book JSON format.');
    }

    async function loadBookList(translationId = state.translationId) {
      const translation = getTranslationConfig(translationId);
      const books = await fetchJson(`${translation.dataDir}/Books.json`);
      if (!Array.isArray(books) || !books.length) {
        throw new Error('Books.json is empty or invalid.');
      }
      return books;
    }

    async function ensureBookLoaded(bookName) {
      if (state.bookCache.has(bookName)) {
        return state.bookCache.get(bookName);
      }

      const translation = getTranslationConfig();
      const encodedFileName = encodeURIComponent(bookName) + '.json';
      const raw = await fetchJson(`${translation.dataDir}/${encodedFileName}`);
      const normalized = normalizeBookPayload(raw);
      state.bookCache.set(bookName, normalized);
      return normalized;
    }

    async function ensureTranslationReady(translationId = state.translationId) {
      let cached = state.translationCache.get(translationId);
      if (!cached) {
        const bundledBible = await loadBundledBibleData(translationId);
        cached = {
          isBundled: Boolean(bundledBible),
          bookOrder: [],
          bookCache: new Map()
        };

        if (bundledBible) {
          cached.bookOrder = Object.keys(bundledBible);
          Object.entries(bundledBible).forEach(([bookName, chapters]) => {
            cached.bookCache.set(bookName, chapters);
          });
        } else {
          cached.bookOrder = await loadBookList(translationId);
        }

        state.translationCache.set(translationId, cached);
      }

      state.translationId = translationId;
      state.bookOrder = cached.bookOrder;
      state.bookCache = cached.bookCache;
      updateMenuButtonLabel();
      return cached;
    }

    function updateReadingStatus(verseNum = null) {
      if (!state.currentBook || !state.currentChapter) {
        readingStatusValueEl.textContent = 'Loading...';

      const verseText = verseNum != null

    function buildVerseMarkup(text) {
      const plainText = text ?? '';
      const locationRanges = [];
      if (state.locationPattern) {
        state.locationPattern.lastIndex = 0;
        for (const match of plainText.matchAll(state.locationPattern)) {
          const index = match.index ?? 0;
          locationRanges.push({
            start: index,
            end: index + match[0].length,
            value: match[0]
          });
        }
      }

      function findLocationRange(index) {
        return locationRanges.find((range) => index >= range.start && index < range.end);
      }

      let markup = '';
      let cursor = 0;
      const wordMatches = plainText.matchAll(/[A-Za-z]+(?:'[A-Za-z]+)?/g);

      for (const match of wordMatches) {
        const word = match[0];
        const index = match.index ?? 0;
        const locationRange = findLocationRange(index);

        if (locationRange) {
          if (cursor < locationRange.start) {
            markup += escapeHtml(plainText.slice(cursor, locationRange.start));
          }
          if (cursor <= locationRange.start) {
            markup += `<button type="button" class="location-link" data-location-name="${escapeHtml(locationRange.value)}">${escapeHtml(locationRange.value)}</button>`;
            cursor = locationRange.end;
          }
          continue;
        }

        markup += escapeHtml(plainText.slice(cursor, index));
        const normalizedWord = word.toLowerCase();
        const meaning = state.wordMeaningLookup.get(normalizedWord);
        if (meaning) {
          markup += `<button type="button" class="word-link" data-word-key="${escapeHtml(normalizedWord)}">${escapeHtml(word)}</button>`;
        } else {
          markup += escapeHtml(word);
        }
        cursor = index + word.length;
      }

      markup += escapeHtml(plainText.slice(cursor));
      return markup;
    }

    function renderVerses() {
      verseContainer.innerHTML = '';

      if (!state.verses.length) {
        verseContainer.innerHTML = '<p class="hint">No verses available for this chapter.</p>';
        return;
      }

      state.verses.forEach((text, idx) => {
        const number = idx + 1;
        const card = document.createElement('article');
        card.id = 'verse-' + number;
        card.className = 'verse-card';

        const numSpan = `<span class="verse-number ${number < 10 ? 'single-digit' : 'double-digit'}">${number}</span>`;
        card.innerHTML = `<p class="verse-line">${numSpan} ${buildVerseMarkup(text)}</p>`;
        verseContainer.appendChild(card);
      });

      state.activeVerse = state.verses.length ? 1 : null;
      updateReadingStatus(state.activeVerse);
    }

    function getLocationReferenceBooks(entry) {
      const books = [];
      const seen = new Set();

      (entry.references || []).forEach((reference) => {
        const match = reference.match(/^(.+?) \d+:\d+$/);
        if (!match) {
          return;
        }

        const bookName = match[1];
        if (!seen.has(bookName)) {
          seen.add(bookName);
          books.push(bookName);
        }
      });

      return books;
    }

    function getMapFilesForLocation(entry) {
      const maps = [];
      const seen = new Set();

      function addMap(fileName) {
        if (!fileName || seen.has(fileName)) {
          return;
        }
        seen.add(fileName);
        maps.push(fileName);
      }

      (LOCATION_TO_MAPS[entry.name] || []).forEach(addMap);
      addMap(BOOK_TO_MAP[state.currentBook]);

      getLocationReferenceBooks(entry)
        .slice(0, 4)
        .forEach((bookName) => addMap(BOOK_TO_MAP[bookName]));

      if (NEW_TESTAMENT_BOOKS.has(state.currentBook)) {
        addMap('37 Israel During the Time of Acts.png');
        addMap('38 The Mediterranean World During the Time of Acts.png');
      } else {
        addMap('09 The Promised Land.png');
        addMap('01 The Near East.png');
      }

      addMap('Near East.png');
      return maps.slice(0, 6);
    }

            <span>${escapeHtml(mapFile.replace(/\.png$/i, ''))}</span>
          </button>
        </li>
      `).join('');

      const firstMap = mapFiles[0];
      if (firstMap) {
        selectLocationMap(firstMap);
      }
    }

      settingsModal.classList.remove('open');
      settingsModal.setAttribute('aria-hidden', 'true');
      settingsButton.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    function findClosestVisibleVerse() {
      const verseCards = verseContainer.querySelectorAll('.verse-card');
      if (!verseCards.length) return null;

      const targetLine = 140;
      let closestVerse = 1;
      let closestDistance = Number.POSITIVE_INFINITY;

      verseCards.forEach((card, index) => {
        const rect = card.getBoundingClientRect();
        const distance = Math.abs(rect.top - targetLine);
        if (distance < closestDistance) {
          closestDistance = distance;
          closestVerse = index + 1;
        }
      });

      return closestVerse;
    }

    function syncReadingStatusToScroll() {
      state.readingStatusRaf = null;

      if (!state.verses.length) {
        updateReadingStatus();
        return;
      }

      const visibleVerse = findClosestVisibleVerse();
      if (visibleVerse == null || visibleVerse === state.activeVerse) {
        return;
      }

      state.activeVerse = visibleVerse;
      updateReadingStatus(visibleVerse);
    }

    function scheduleReadingStatusSync() {
      if (state.readingStatusRaf != null) {
        return;
      }

      state.readingStatusRaf = window.requestAnimationFrame(syncReadingStatusToScroll);
    }

    function flashVerse(target) {
      target.classList.remove('verse-flash');
      void target.offsetWidth;
      target.classList.add('verse-flash');
      window.setTimeout(() => target.classList.remove('verse-flash'), 1100);
    }

    function scrollToVerse(verseNum) {
      const target = document.getElementById('verse-' + verseNum);
      if (!target) return;

      const topOffset = window.matchMedia('(max-width: 520px)').matches ? 132 : 80;
      const elementPosition = target.getBoundingClientRect().top + window.pageYOffset;
      const offsetPosition = elementPosition - topOffset;
      const scrollDistance = Math.abs(window.pageYOffset - offsetPosition);
      const highlightDelay = Math.min(700, Math.max(180, Math.round(scrollDistance * 0.35)));

      window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
      state.activeVerse = verseNum;
      updateReadingStatus(verseNum);
      window.setTimeout(() => {
        flashVerse(target);
        scheduleReadingStatusSync();
      }, highlightDelay);
    }

    function captureVerseViewportAnchor() {
      const verseNum = findClosestVisibleVerse() ?? state.activeVerse ?? 1;
      const target = document.getElementById('verse-' + verseNum);
      return {
        verseNum,
        top: target ? target.getBoundingClientRect().top : null
      };
    }

    function restoreVerseViewportAnchor(anchor) {
      if (!anchor || anchor.top == null) {
        return;
      }

      const target = document.getElementById('verse-' + anchor.verseNum);
      if (!target) {
        return;
      }

      const currentTop = target.getBoundingClientRect().top;
      const delta = currentTop - anchor.top;
      if (Math.abs(delta) > 1) {
        window.scrollBy({ top: delta, left: 0, behavior: 'auto' });
      }

      state.activeVerse = anchor.verseNum;
      updateReadingStatus(anchor.verseNum);
      scheduleReadingStatusSync();
    }

    async function goToChapter(bookName, chapterNumber, options = {}) {
      const { scrollToTop = true, scrollVerse = null } = options;

      const bookData = await ensureBookLoaded(bookName);
      const chapterNumbers = Object.keys(bookData).map(Number).sort((a, b) => a - b);

      if (!chapterNumbers.length) {
        throw new Error(`No chapters found for ${bookName}.`);
      }

      const safeChapter = chapterNumbers.includes(Number(chapterNumber))
        ? Number(chapterNumber)
        : chapterNumbers[0];

      state.currentBook = bookName;
      state.currentChapter = safeChapter;
      state.selectedBook = bookName;
      state.selectedChapterForVerses = String(safeChapter);
      state.verses = bookData[String(safeChapter)] || [];

      updateVerseAccentTheme(bookName);
      updatePageTitle();
      setHint('Scroll down to read, or use the menu to jump to any verse.');
      renderVerses();
      updateNavBtns();
      updateReadingStatus(state.activeVerse);

      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        state.activeVerse = 1;
        updateReadingStatus(1);
      }

      if (scrollVerse != null) {
        requestAnimationFrame(() => scrollToVerse(scrollVerse));
      }
    }

    async function getPreviousLocation() {
      if (!state.currentBook || !state.currentChapter) return null;

      const chapterNumbers = getChapterNumbers(state.currentBook);
      const chapterIndex = chapterNumbers.indexOf(state.currentChapter);

      if (chapterIndex > 0) {
        return { book: state.currentBook, chapter: chapterNumbers[chapterIndex - 1] };
      }

      const bookIndex = state.bookOrder.indexOf(state.currentBook);
      if (bookIndex <= 0) return null;

      const previousBook = state.bookOrder[bookIndex - 1];
      await ensureBookLoaded(previousBook);
      const previousBookChapters = getChapterNumbers(previousBook);
      if (!previousBookChapters.length) return null;

      return { book: previousBook, chapter: previousBookChapters[previousBookChapters.length - 1] };
    }

    async function getNextLocation() {
      if (!state.currentBook || !state.currentChapter) return null;

      const chapterNumbers = getChapterNumbers(state.currentBook);
      const chapterIndex = chapterNumbers.indexOf(state.currentChapter);

      if (chapterIndex >= 0 && chapterIndex < chapterNumbers.length - 1) {
        return { book: state.currentBook, chapter: chapterNumbers[chapterIndex + 1] };
      }

      const bookIndex = state.bookOrder.indexOf(state.currentBook);
      if (bookIndex < 0 || bookIndex >= state.bookOrder.length - 1) return null;

      const nextBook = state.bookOrder[bookIndex + 1];
      await ensureBookLoaded(nextBook);
      const nextBookChapters = getChapterNumbers(nextBook);
      if (!nextBookChapters.length) return null;

      return { book: nextBook, chapter: nextBookChapters[0] };
    }

    function updateNavBtns() {
      if (!state.currentBook || !state.currentChapter) {
        prevChapterBtn.disabled = true;
        nextChapterBtn.disabled = true;
        return;
      }

      const chapterNumbers = getChapterNumbers(state.currentBook);
      const currentBookIndex = state.bookOrder.indexOf(state.currentBook);

      const hasPrev = (chapterNumbers.length && state.currentChapter > chapterNumbers[0]) || currentBookIndex > 0;
      const hasNext = (chapterNumbers.length && state.currentChapter < chapterNumbers[chapterNumbers.length - 1]) || currentBookIndex < state.bookOrder.length - 1;

      prevChapterBtn.disabled = !hasPrev;
      nextChapterBtn.disabled = !hasNext;
    }

    async function renderMenu() {
      menuDrop.innerHTML = '<div class="menu-status">Loading...</div>';
      applyMenuLayout();
      updateMenuTheme();
      applyMenuTransition();

      try {
        if (state.menuState === 'books') {
          menuDrop.innerHTML = '';
          updateMenuTheme();
          appendMenuSubhead('Old Testament');
          state.bookOrder.forEach((book) => {
            if (NEW_TESTAMENT_BOOKS.has(book)) {
              return;
            }

            const bookBtn = document.createElement('button');
            bookBtn.textContent = book;
            bookBtn.className = 'book-btn old-testament';
            bookBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              state.selectedBook = book;
              await ensureBookLoaded(book);
              state.menuTransition = 'slide-in-next';
              state.menuState = 'chapters';
              await renderMenu();
            });
            menuDrop.appendChild(bookBtn);
          });

          appendMenuSubhead('New Testament');
          state.bookOrder.forEach((book) => {
            if (!NEW_TESTAMENT_BOOKS.has(book)) {
              return;
            }

            const bookBtn = document.createElement('button');
            bookBtn.textContent = book;
            bookBtn.className = 'book-btn new-testament';
            bookBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              state.selectedBook = book;
              await ensureBookLoaded(book);
              state.menuTransition = 'slide-in-next';
              state.menuState = 'chapters';
              await renderMenu();
            });
            menuDrop.appendChild(bookBtn);
          });
          return;
        }

        if (state.menuState === 'chapters') {
          await ensureBookLoaded(state.selectedBook);
          const chapters = getChapterNumbers(state.selectedBook);

          menuDrop.innerHTML = '';
          updateMenuTheme();
          appendMenuSubhead(`Choose a chapter in ${state.selectedBook}`);

          const backBtn = document.createElement('button');
          backBtn.textContent = '←';
          backBtn.className = 'back-btn';
          backBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            state.menuTransition = 'slide-in-back';
            state.menuState = 'books';
            await renderMenu();
          });
          menuDrop.appendChild(backBtn);

          chapters.forEach((chapterNum) => {
            const chapterBtn = document.createElement('button');
            chapterBtn.textContent = chapterNum;
            chapterBtn.className = (state.selectedBook === state.currentBook && chapterNum === state.currentChapter)
              ? 'current-chapter'
              : '';

            chapterBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              state.selectedChapterForVerses = String(chapterNum);
              state.menuTransition = 'slide-in-next';
              state.menuState = 'verses';
              await renderMenu();
            });

            menuDrop.appendChild(chapterBtn);
          });
          return;
        }

        if (state.menuState === 'verses') {
          await ensureBookLoaded(state.selectedBook);
          const bookData = state.bookCache.get(state.selectedBook) || {};
          const chapterVerses = bookData[state.selectedChapterForVerses] || [];

          menuDrop.innerHTML = '';
          updateMenuTheme();
          appendMenuSubhead(`Choose a verse in ${state.selectedBook} ${state.selectedChapterForVerses}`);

          const backBtn = document.createElement('button');
          backBtn.textContent = '←';
          backBtn.className = 'back-btn';
          backBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            state.menuTransition = 'slide-in-back';
            state.menuState = 'chapters';
            await renderMenu();
          });
          menuDrop.appendChild(backBtn);

          chapterVerses.forEach((_, idx) => {
            const verseNum = idx + 1;
            const verseBtn = document.createElement('button');
            verseBtn.textContent = String(verseNum);

            verseBtn.addEventListener('click', async (e) => {
              e.stopPropagation();

              if (state.selectedBook !== state.currentBook || Number(state.selectedChapterForVerses) !== state.currentChapter) {
                await goToChapter(state.selectedBook, Number(state.selectedChapterForVerses), {
                  scrollToTop: false,
                  scrollVerse: verseNum
                });
              } else {
                scrollToVerse(verseNum);
              }

              closeMenu();
            });

            menuDrop.appendChild(verseBtn);
          });
        }
      } catch (error) {
        menuDrop.innerHTML = '<div class="menu-status">' + error.message + '</div>';
      }
    }

    async function switchTranslation(nextTranslationId) {
      if (!TRANSLATIONS[nextTranslationId] || nextTranslationId === state.translationId) {
        updateMenuButtonLabel();
        return;
      }

      const previousBook = state.currentBook;
      const previousChapter = state.currentChapter;
      const previousAnchor = captureVerseViewportAnchor();
      translationButtons.forEach((button) => { button.disabled = true; });
      closeMenu();

      try {
        const translationState = await ensureTranslationReady(nextTranslationId);
        const fallbackBook = previousBook && translationState.bookOrder.includes(previousBook)
          ? previousBook
          : (translationState.bookOrder.includes('Genesis') ? 'Genesis' : translationState.bookOrder[0]);

        if (!fallbackBook) {
          throw new Error('No books found for the selected translation.');
        }

        await ensureBookLoaded(fallbackBook);
        const chapterNumbers = getChapterNumbers(fallbackBook);
        const nextChapter = previousChapter && chapterNumbers.includes(previousChapter)
          ? previousChapter
          : chapterNumbers[0];

        await goToChapter(fallbackBook, nextChapter, {
          scrollToTop: false
        });

        if (previousBook === fallbackBook && previousChapter === nextChapter) {
          requestAnimationFrame(() => restoreVerseViewportAnchor(previousAnchor));
        }

        const translation = getTranslationConfig();
        if (translationState.isBundled) {
          setHint(`Loaded ${translation.label} from the local offline bundle. Use the menu to jump to any available verse.`);
        } else {
          setHint(`Showing the ${translation.label}. Scroll down to read, or use the menu to jump to any verse.`);
        }

        closeSettingsModal();
      } finally {
        translationButtons.forEach((button) => { button.disabled = false; });
      }
    }

    menuButton.addEventListener('click', async () => {
      if (menuDrop.classList.contains('open')) {
        closeMenu();
      } else {
        await openMenu();
      }
    });
    settingsButton.addEventListener('click', () => {
      if (settingsModal.classList.contains('open')) {
        closeSettingsModal();
      } else {
        closeMenu();
        closeLocationModal();
        closeWordModal();
        openSettingsModal();
      }
    });

    document.addEventListener('click', (e) => {
      if (!menuDrop.contains(e.target) && e.target !== menuButton) {
        closeMenu();
      }
    });
    translationButtons.forEach((button) => {
      button.addEventListener('click', async () => {
        try {
          await switchTranslation(button.dataset.translation);
        } catch (error) {
          updateMenuButtonLabel();
          showError(error.message);
        }
      });
    });

    verseContainer.addEventListener('click', (e) => {
      const locationButton = e.target.closest('.location-link');
      if (!locationButton) {
        const wordButton = e.target.closest('.word-link');
        if (!wordButton) {
          return;
        }

        openWordModal(wordButton.dataset.wordKey, wordButton.textContent);
        return;
      }

      openLocationModal(locationButton.dataset.locationName);
    });

    locationMapGalleryEl.addEventListener('click', (e) => {
      const mapButton = e.target.closest('button[data-map-file]');
      if (!mapButton) {
        return;
      }

      selectLocationMap(mapButton.dataset.mapFile);
    });

    locationModalCloseBtn.addEventListener('click', closeLocationModal);
    locationZoomOutBtn.addEventListener('click', () => {
      state.locationMapZoom = Math.max(1, Number((state.locationMapZoom - 0.2).toFixed(2)));
      updateLocationMapZoom();
    });
    locationZoomResetBtn.addEventListener('click', () => {
      state.locationMapZoom = 1;
      updateLocationMapZoom();
    });
    locationZoomInBtn.addEventListener('click', () => {
      state.locationMapZoom = Math.min(2.4, Number((state.locationMapZoom + 0.2).toFixed(2)));
      updateLocationMapZoom();
    });
    locationModal.addEventListener('click', (e) => {
      if (e.target === locationModal) {
        closeLocationModal();
      }
    });
    wordModalCloseBtn.addEventListener('click', closeWordModal);
    wordModal.addEventListener('click', (e) => {
      if (e.target === wordModal) {
        closeWordModal();
      }
    });
    settingsModalCloseBtn.addEventListener('click', closeSettingsModal);
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        closeSettingsModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && locationModal.classList.contains('open')) {
        closeLocationModal();
      }
      if (e.key === 'Escape' && wordModal.classList.contains('open')) {
        closeWordModal();
      }
      if (e.key === 'Escape' && settingsModal.classList.contains('open')) {
        closeSettingsModal();
      }
    });

    window.addEventListener('scroll', scheduleReadingStatusSync, { passive: true });
    window.addEventListener('resize', scheduleReadingStatusSync);

    nextChapterBtn.addEventListener('click', async () => {
      try {
        const nextLocation = await getNextLocation();
        if (nextLocation) {
          await goToChapter(nextLocation.book, nextLocation.chapter);
        }
      } catch (error) {
        showError(error.message);
      }
    });

    prevChapterBtn.addEventListener('click', async () => {
      try {
        const prevLocation = await getPreviousLocation();
        if (prevLocation) {
          await goToChapter(prevLocation.book, prevLocation.chapter);
        }
      } catch (error) {
        showError(error.message);
      }
    });

    async function loadBible() {
      try {
        await loadLocationData();
        await loadWordMeaningData();
        const translationState = await ensureTranslationReady(DEFAULT_TRANSLATION_ID);

        const defaultBook = state.bookOrder.includes('Genesis')
          ? 'Genesis'
          : state.bookOrder[0];

        await goToChapter(defaultBook, 1, { scrollToTop: false });
        if (translationState.isBundled) {
          setHint('Loaded NIV from the local offline bundle. Use the menu to jump to any available verse.');
        }
      } catch (error) {
        const localFileHint = window.location.protocol === 'file:'
          ? ' Browsers usually block multi-file JSON loading from file://. The page now falls back to local translation bundles when available, but the full source folders still require a local server.'
          : '';

        showError(error.message + localFileHint);
      }
    }

    loadBible();
  </script>
</body>
</html>
