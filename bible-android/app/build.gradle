apply plugin: 'com.android.application'

android {
    compileSdkVersion 30

    defaultConfig {
        applicationId 'io.github.junha2010.bible'
        minSdkVersion 23
        targetSdkVersion 30
        versionCode 1
        versionName '1.0'
    }

    sourceSets {
        main {
            assets.srcDirs = ['../../bible']
        }
    }
}
